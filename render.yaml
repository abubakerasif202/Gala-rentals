services:
  - type: web
    name: aurora-rentals
    runtime: node
    plan: starter
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci --include=dev && npm run validate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CHECKOUT_LINK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LEASE_OWNER_NAME
        value: "Aurora Rentals"
      - key: LEASE_OWNER_ADDRESS
        value: "Sydney NSW"
      - key: LEASE_OWNER_CONTACT
        value: "1300 555 828"
      - key: LEASE_OWNER_EMAIL
        value: "hello@aurorarentals.com.au"
