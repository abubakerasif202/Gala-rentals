services:
  - type: web
    name: maple-rental
    runtime: node
    plan: starter
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci --include=dev && npm run validate && npm run build
    startCommand: npm start
    healthCheckPath: /api/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CHECKOUT_LINK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LEASE_OWNER_NAME
        value: "Maple Rentals"
      - key: LEASE_OWNER_ADDRESS
        value: "13/27-33 Addlestone Rd, Merrylands NSW 2160"
      - key: LEASE_OWNER_CONTACT
        value: "0420 550 556"
      - key: LEASE_OWNER_EMAIL
        value: "admin@maplerentals.com.au"
